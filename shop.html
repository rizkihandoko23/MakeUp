<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinkGlow - Makeup Impianmu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Include header same as index.html -->

    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="logo">
                    <h2><i class="fas fa-kiss-wink-heart"></i> PinkGlow</h2>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
                <div class="nav-icons">
                    <a href="#" class="cart-icon"><i class="fas fa-shopping-bag"></i><span class="cart-count">0</span></a>
                    <a href="#" class="search-icon"><i class="fas fa-search"></i></a>
                </div>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </nav>
    </header>
    
    <section class="shop-page">
        <div class="container">
            <div class="shop-header">
                <h1 class="page-title">Our Collection</h1>
                <div class="shop-filters">
                    <select class="filter-select">
                        <option>Kategori</option>
                        <option>Lipstick</option>
                        <option>Eyeshadow</option>
                        <option>Foundation</option>
                    </select>
                    <select class="filter-select">
                        <option>Urutkan</option>
                        <option>Harga Terendah</option>
                        <option>Harga Tertinggi</option>
                        <option>Terbaru</option>
                    </select>
                </div>
            </div>
            
            <div class="product-grid">
                <!-- Product cards will be generated here -->
                <div class="product-card" data-id="1">
                    <div class="product-image">
                        <img src="image/Foto1.webp" alt="Lipstick">
                    </div>
                    <div class="product-info">
                        <h3>Velvet Matte Lipstick</h3>
                        <div class="product-price">Rp 149.000</div>
                        <button class="add-to-cart" onclick="addToCart(1)">Tambah ke Keranjang</button>
                    </div>
                </div>

                <div class="product-card" data-id="2">
                    <div class="product-image">
                        <img src="https://down-id.img.susercontent.com/file/id-11134207-7r992-lyk45qhrtuthf8@resize_w900_nl.webp" alt="Eyeshadow">
                    </div>
                    <div class="product-info">
                        <h3>Eyeshadow Matte</h3>
                        <div class="product-price">Rp 285.000</div>
                        <button class="add-to-cart" onclick="addToCart(1)">Tambah ke Keranjang</button>
                    </div>
                </div>

                <div class="product-card" data-id="">
                    <div class="product-image">
                        <img src="https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Lipstick">
                    </div>
                    <div class="product-info">
                        <h3>Velvet Matte Lipstick</h3>
                        <div class="product-price">Rp 149.000</div>
                        <button class="add-to-cart" onclick="addToCart(1)">Tambah ke Keranjang</button>
                    </div>
                </div>
                <!-- Repeat for more products -->
            </div>
        </div>
    </section>
    
    <!-- Include footer -->
    <script src="script.js"></script>
</body>
</html>
